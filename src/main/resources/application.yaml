server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  datasource:
    url: aaaa
    password: bbbb
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  data:
    redis:
      host: cccc
      port: 6379
      password: dddd
      database: 0
  mail:
    host: smtp.qq.com
    port: 465
    username: eeee
    password: ffff
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: smtp.qq.com

app:
  jwt:
    issuer: security-demo
    access-token-ttl: 15m
    refresh-token-ttl: 7d
    secret: "ffff"
    expiration-seconds: 3600
  token:
    redis-prefix: "login:token:"
  cors:
    allowed-origins:
      - "http://localhost:5173"
  # 与 sys_roles.name 一致；无权限的用户访问对应 API 将返回 403
  security:
    cinema-api-roles:
      - SUPER_ADMIN
      - ADMIN
    movie-api-roles:
      - SUPER_ADMIN
      - ADMIN
    order-api-roles:
      - SUPER_ADMIN
      - ADMIN
    user-api-roles:
      - SUPER_ADMIN
      - ADMIN
    settings-api-roles:
      - SUPER_ADMIN
      - ADMIN


